title = "e-zer0 gitleaks config"

# Extend the default ruleset rather than replacing it.
[extend]
useDefault = true

# Allow placeholder values inside example/template files. These never contain
# real secrets — the live equivalents are gitignored or stored in encrypted D1.
[allowlist]
description = "Documented placeholders + sanitizer test fixtures"
paths = [
  '''(^|/)\.dev\.vars\.example$''',
  '''(^|/)docs/.*\.md$''',
  '''(^|/)README\.md$''',
  # Test fixtures (fake PEM markers, dummy AES keys for crypto round-trips).
  # Allowlisting *.test.ts is acceptable here because Workers test files are
  # never deployed and contain only synthetic values.
  '''(^|/)src/.*\.test\.ts$''',
]
