name = "e-zer0"
main = "src/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ──────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "e-zer0-db"
database_id = "local"                     # overwritten by setup-cf.js in CI
migrations_dir = "migrations"

# ── Vectorize (requires Cloudflare login — uncomment for remote dev/deploy) ──
# [[vectorize]]
# binding = "VECTOR_INDEX"
# index_name = "e-zer0-index"

# ── Workers AI (requires Cloudflare login — uncomment for remote dev/deploy) ──
# [ai]
# binding = "AI"

# ── Rate Limiting KV ─────────────────────────────────────
# Required for brute-force protection on /login and /mcp/token.
# The id below is a placeholder for local dev; setup-cf.js overwrites it for production.
[[kv_namespaces]]
binding = "RATE_LIMITER"
id = "local"
preview_id = "local"

# ── Cron Triggers (uncomment for remote deploy) ─────────
# [triggers]
# crons = ["0 * * * *"]
